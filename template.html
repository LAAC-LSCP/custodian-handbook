<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SITE_TITLE}}</title>
<style>
/* ── Google Fonts (Lora) ── */
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap');

/* ── Reset ── */
html,body,div,span,h1,h2,h3,h4,h5,h6,p,blockquote,pre,a,abbr,code,em,img,
ol,ul,li,fieldset,form,label,table,caption,tbody,tfoot,thead,tr,th,td,
article,aside,details,figcaption,figure,footer,header,nav,section,summary {
    margin:0; padding:0; border:0; font:inherit; font-size:100%; vertical-align:baseline;
}
article,aside,details,figcaption,figure,footer,header,nav,section { display:block; }
body { line-height:1; margin:0; }
ol,ul { list-style:none; }
blockquote,q { quotes:none; }
table { border-collapse:collapse; border-spacing:0; }
button { all:unset; cursor:pointer; }
a,a:visited { text-decoration:none; }

/* ── Typography ── */
body {
    font-family: Lora, ui-sans-serif, system-ui, sans-serif;
    background-color: oklch(98.5% .002 247.839deg);
    color: oklch(44.6% .03 256.802deg);
}
h1 { color:#000; font-weight:700; font-size:60px; }
h2 {
    font-weight:700; font-size:30px; line-height:36px;
    color:oklch(21% .034 264.665deg); margin-bottom:20px;
}
h3 {
    font-size:20px; color:oklch(21% .034 264.665deg); font-weight:600;
    margin-top:28px; margin-bottom:10px;
}
h4 {
    font-size:16px; font-weight:600; color:oklch(21% .034 264.665deg);
    margin-top:20px; margin-bottom:6px;
}
p {
    color:oklch(44.6% .03 256.802deg); line-height:24px; font-size:16px;
    margin-bottom:16px;
}
p:last-child { margin-bottom:0; }
a  { color:oklch(54.6% .245 262.881deg); font-weight:500; }
a:hover { text-decoration:underline; }
strong { font-weight:700; }
em { font-style:italic; }

/* ── Code blocks ── */
pre, code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                 "liberation mono", "courier new", monospace;
    font-size: 13px;
    line-height: 20px;
}
pre {
    background-color: oklch(21% .034 264.665deg);
    color: oklch(93.2% .032 255.585deg);
    border-radius: 10px;
    padding: 20px 24px;
    overflow-x: auto;
    margin: 16px 0;
    white-space: pre-wrap;
    word-break: break-word;
}
code {
    background-color: oklch(93.2% .032 255.585deg);
    color: oklch(37.3% .034 259.733deg);
    padding: 2px 6px;
    border-radius: 4px;
}
pre code {
    background: none;
    color: inherit;
    padding: 0;
    border-radius: 0;
}

/* ── Lists ── */
.docs-page-container ul,
.docs-page-container ol {
    padding-left: 24px;
    margin-bottom: 16px;
}
.docs-page-container ul { list-style: disc; }
.docs-page-container ol { list-style: decimal; }
.docs-page-container li {
    color: oklch(44.6% .03 256.802deg);
    line-height: 24px;
    font-size: 16px;
    margin-bottom: 8px;
}

/* ── Blockquote → note box ── */
.docs-page-container blockquote {
    background-color: #d6e8f6;
    border-left: 4px solid #256a9f;
    padding: 16px 20px;
    border-radius: 0 8px 8px 0;
    margin: 16px 0;
}
.docs-page-container blockquote p {
    margin-bottom: 0;
    color: oklch(21% .034 264.665deg);
}

/* ── Top nav bar ── */
.navigation-bar {
    position: fixed; top:0; left:0; width:100%;
    z-index:1000; background-color:#fff;
    box-shadow: 0 2px 8px rgba(0,0,0,8%);
    box-sizing: border-box;
}
.header-nav {
    padding: 0 2rem; height:64px;
    display:flex; align-items:center;
    justify-content:space-between;
    max-width:1280px; margin:0 auto;
}
.site-title {
    font-weight:700; font-size:22px;
    color:oklch(54.6% .245 262.881deg);
}

/* ── Main layout ── */
main {
    margin-top: 64px;
    padding: 48px 24px;
    background-color: oklch(98.5% .002 247.839deg);
    min-height: calc(100vh - 64px);
}
.docs-wrapper {
    margin: 0 auto;
    max-width: 1280px;
    display: flex;
    flex-direction: row;
    column-gap: 32px;
    align-items: flex-start;
}

/* ── Sidebar ── */
.docs-sidebar {
    background-color: #fff;
    padding: 20px 16px;
    position: sticky;
    top: 88px;
    overflow-y: auto;
    width: 240px;
    flex-shrink: 0;
    border-radius: 14px;
    border: 1px solid oklch(92.8% .006 264.531deg);
    box-shadow: rgba(0,0,0,5%) 0 4px 6px -1px;
}
.docs-sidebar h3 {
    padding: 0 8px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: oklch(55.1% .027 264.364deg);
    margin-bottom: 12px;
    margin-top: 0;
    line-height: 20px;
}
.docs-sidebar nav {
    display:flex; flex-direction:column;
}
.docs-sidebar button {
    padding: 8px 12px;
    color: oklch(37.3% .034 259.733deg);
    font-size: 15px; font-weight: 500;
    line-height: 22px; border-radius: 8px;
    text-align: left;
    transition: color .15s, background-color .15s;
}
.docs-sidebar nav > button:not(:last-child) { margin-bottom:2px; }
.active-sidebar-btn {
    color: oklch(48.8% .243 264.376deg) !important;
    background-color: oklch(93.2% .032 255.585deg) !important;
    cursor: default;
}
.inactive-sidebar-btn:hover {
    background-color: oklch(96.7% .003 264.542deg);
    color: oklch(21% .034 264.665deg);
}

/* ── Content area ── */
.docs-main-content {
    width: 100%;
    min-width: 0;
}
.docs-main-content > * {
    margin-bottom: 48px;
}
.docs-main-content > :last-child {
    margin-bottom: 0;
}

/* ── Section card ── */
.docs-page-container {
    background-color: #fff;
    border-radius: 14px;
    padding: 40px;
    border: 1px solid oklch(92.8% .006 264.531deg);
    box-shadow: rgba(0,0,0,4%) 0 4px 6px -1px;
    scroll-margin-top: 88px;
}
.docs-page-container > h1:first-child,
.docs-page-container > h2:first-child {
    font-size: 26px;
    font-weight: 700;
    color: #256a9f;
    padding-bottom: 14px;
    margin-bottom: 20px;
    border-bottom: 2px solid #d6e8f6;
    margin-top: 0;
}

/* ── Footer ── */
.site-footer {
    display:flex; align-items:center; justify-content:center;
    background-color:#256a9f; padding:28px 0;
}
.site-footer p { color:#fff; font-size:14px; }

/* ── Responsive ── */
@media(max-width:768px) {
    .docs-wrapper { flex-direction:column; }
    .docs-sidebar {
        position:static; width:100%; max-width:100%;
        box-sizing:border-box;
    }
    .docs-page-container { padding:24px 20px; }
    h1 { font-size:36px; }
}
</style>
</head>
<body>

<div class="navigation-bar">
  <nav class="header-nav">
    <div>
      <span class="site-title">{{SITE_TITLE}}</span>
    </div>
  </nav>
</div>

<main>
  <div class="docs-wrapper">

    <aside class="docs-sidebar">
      <h3>Contents</h3>
      <nav id="sidebar-nav">
        {{SIDEBAR_ITEMS}}
      </nav>
    </aside>

    <div class="docs-main-content" id="main-content">
      {{CONTENT_BLOCKS}}
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="text-container">
    <p>{{FOOTER_TEXT}}</p>
  </div>
</footer>

<script>
// ── Sidebar active state on scroll ────────────────────────────────────────

const sectionIds = {{SECTION_IDS}};

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateActiveSidebar() {
  const scrollY = window.scrollY + 100;
  let current = sectionIds[0];
  for (const id of sectionIds) {
    const el = document.getElementById(id);
    if (el && el.offsetTop <= scrollY) current = id;
  }
  document.querySelectorAll('#sidebar-nav button').forEach((btn, i) => {
    const isActive = sectionIds[i] === current;
    btn.className = isActive ? 'active-sidebar-btn' : 'inactive-sidebar-btn';
  });
}

window.addEventListener('scroll', updateActiveSidebar, { passive: true });
updateActiveSidebar();
</script>

</body>
</html>
